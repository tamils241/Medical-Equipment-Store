<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MediStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="section-darker d-flex align-items-center py-5" style="min-height: 100vh;">
  <!-- ====== Loader ====== -->
  <div id="loader">
    <div class="loader-content">
      <div class="loader-ring"></div>
      <div class="loader-ring-inner"></div>
      <i class="bi bi-heart-pulse"></i>
    </div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-lg-5" data-aos="fade-up">
          <div class="text-center mb-4">
            <a href="index.html">
              <img src="images/logo.webp" alt="MediStore" height="45" class="logo-blue" data-aos="fade-down">
            </a>
          </div>
          <div class="text-center mb-4">
            <h4 class="fw-bold" data-aos="fade-up" data-aos-delay="50">Sign In</h4>
            <p class="text-muted small" data-aos="fade-up" data-aos-delay="100">Enter your credentials to access your account</p>
          </div>
          <form id="loginForm">
            <div class="mb-3" data-aos="fade-up" data-aos-delay="150">
              <label for="email" class="form-label fw-medium">Email Address</label>
              <input type="email" class="form-control form-control-lg rounded-pill" id="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3" data-aos="fade-up" data-aos-delay="200">
              <label for="password" class="form-label fw-medium">Password</label>
              <input type="password" class="form-control form-control-lg rounded-pill" id="password" placeholder="Enter your password" minlength="8" required>
            </div>
            <div class="mb-3" data-aos="fade-up" data-aos-delay="250">
              <label class="form-label fw-medium">Sign in as</label>
              <label class="role-toggle w-100">
                <input type="checkbox" id="loginRole" checked>
                <span class="toggle-slider"></span>
                <span class="toggle-option active">User</span>
                <span class="toggle-option">Admin</span>
              </label>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4" data-aos="fade-up" data-aos-delay="300">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label small" for="remember">Remember me</label>
              </div>
              <a href="404.html" class="small text-primary text-decoration-none">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill" data-aos="fade-up" data-aos-delay="350">Sign In</button>
          </form>
          <div class="text-center mt-4" data-aos="fade-up" data-aos-delay="400">
            <p class="small text-muted mb-0">Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-medium" id="switchToRegister">Create one</a></p>
          </div>
          <hr class="my-4">
          <div class="text-center" data-aos="fade-up" data-aos-delay="450">
            <a href="index.html" class="btn btn-outline-primary rounded-pill px-4"><i class="bi bi-house-door me-1"></i>Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
